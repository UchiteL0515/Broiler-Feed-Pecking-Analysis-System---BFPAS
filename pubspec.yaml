publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  http: ^1.2.0        # Wi-Fi / HTTP transfer from rasp pi system
  sqflite: ^2.3.2     # Local SQL database
