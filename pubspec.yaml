name: bfpas_app
description: Broiler Feed-Pecking Analysis System - Behavioral Anomaly Detection Mobile App 
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0        # Wi-Fi / HTTP transfer from rasp pi system
  sqflite: ^2.3.2     # Local SQL database
  path: ^1.9.0        # Path helper for SQLite
  provider: ^6.1.2    # State management
  cupertino_icons: ^1.0.6
  audioplayers: ^6.0.0
  wakelock_plus: ^1.1.4
  shared_preferences: ^2.2.3
  
  

dev_dependencies:
  flutter_test: 
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.13.1

flutter:
  

  uses-material-design: true
  assets:
   - assets/images/app1.png
   - assets/images/loading screen.png
   - assets/images/app2.png
   - assets/images/app3.png
   - assets/images/app4.png
   - assets/sound/chicken.mp3
  # assets:
  #   - assets/images/
flutter_native_splash:
  color: "#F5F7F5"
  image: assets/images/app2.png

  android: true
  ios: true

  android_12:
    color: "#F5F7F5"
    image: assets/images/app2.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app1.png"

  adaptive_icon_background: "#F5F7F5"   # or your green
  adaptive_icon_foreground: "assets/images/app1.png"